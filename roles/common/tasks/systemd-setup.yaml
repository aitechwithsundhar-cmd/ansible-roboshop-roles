- name: Copy {{ component }} file
  ansible.builtin.template:
    src: "{{ component }}.service.j2"
    dest: "/etc/systemd/system/{{ component }}.service"

- name: daemon reload
  ansible.builtin.systemd_service:
    daemon_reload: true

- name: Start {{ component }}
  ansible.builtin.systemd_service:
    name: "{{ component }}"
    state: restarted
    enabled: true